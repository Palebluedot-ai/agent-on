# 单一控制点(只有 orchestrator 写;轨道 agent 只读)
version: 1
project: "[项目名]"

current_phase: "[一句话:现在在哪]"
# current_bottleneck: 只写会挡住 agent 动手的阻塞。
# 禁止把 human-async 单独写成全局瓶颈(人审 Excel/人买域名/人给密钥等)——那些进 phases 并行 todo 或单卡 status:blocked。
# 实证:IPONews 2026-07-16 excel 审阅占 bottleneck 冻结整仓;改并行 todo 后同日多 Loop 交付。
current_bottleneck: "[当前最大瓶颈——仅 agent 动手阻塞;human-async 勿独占此字段]"
monitoring_summary: "[最近一次合流的战报摘要:测试数/关键交付/悬点裁决]"

phases:
  - id: "[s1.1-xxx]"
    file: "docs/phases/phase-[s1.1-xxx].md"
    range: "1-30"
    self_contained: true
    status: "todo"          # todo | in_progress | done | blocked
    error_signals_unhandled: 0

notes: "[悬点裁决记录/挂账项/下一步]"
